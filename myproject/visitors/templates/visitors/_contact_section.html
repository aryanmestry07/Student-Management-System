<div id="contact" class="container my-5 py-4">
    <div class="text-center mb-5">
        <h2 class="fw-bold">Get in Touch</h2>
        <p class="lead text-muted">We're here to help. Send us a message or find us on the map.</p>
    </div>

    <div class="row g-5">
        <div class="col-lg-6">
            <div class="bg-white rounded shadow-sm p-4 p-md-5">
                <form>
                    <div class="mb-3">
                        <label for="contactName" class="form-label">Your Name</label>
                        <input type="text" class="form-control" id="contactName" required>
                    </div>
                    <div class="mb-3">
                        <label for="contactEmail" class="form-label">Your Email</label>
                        <input type="email" class="form-control" id="contactEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="contactSubject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="contactSubject">
                    </div>
                    <div class="mb-3">
                        <label for="contactMessage" class="form-label">Message</label>
                        <textarea class="form-control" id="contactMessage" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="border-radius: 20px; padding: 10px 30px;">Send Message</button>
                </form>
            </div>
        </div>

        <div class="col-lg-6">
            <h4 class="fw-bold">Contact Information</h4>
            <p><strong>Phone:</strong> +91 12345 67890</p>
            <p><strong>Email:</strong> info@ice.edu</p>
            <p><strong>Address:</strong> 123 Education Way, Tech Park, City, State 12345</p>
            
            <div class="mt-4 shadow-sm rounded" style="overflow: hidden;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3770.718871630985!2d72.8879686148529!3d19.07609078708785!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c6306644edc1%3A0x5da4ed8f8d648c67!2sMumbai%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1678886543210!5m2!1sen!2sin" 
                        width="100%" 
                        height="350" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy">
                </iframe>
            </div>
        </div>
    </div>
</div>
