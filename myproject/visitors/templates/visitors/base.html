<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduManage Visitors{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 2. STYLES FOR FIXED NAV/FOOTER & SCROLLING */
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 70px; /* Matches body padding-top */
        }
        body {
            background-color: #f4f7fa;
            font-family: 'Poppins', sans-serif;
            padding-top: 70px; /* Pushes content down */
        }
        nav.navbar {
            background-color: #004aad;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        nav .navbar-brand, nav .nav-link {
            color: white !important;
        }
        nav .nav-link.active {
            font-weight: 600;
        }
        nav .nav-link:hover {
            color: #e0e0e0 !important;
        }
        .btn-outline-light {
            --bs-btn-hover-color: #004aad;
            --bs-btn-hover-bg: #ffffff;
            border-radius: 20px;
            padding: 6px 20px;
        }
        footer {
            color: grey;
            text-align: center;
            padding: 10px 0;
            {% comment %} position: fixed; {% endcomment %}
            bottom: 0;
            width: 100%;
            background-color: #f4f7fa;
        }
        .content {
            padding: 20px;
            margin-bottom: 80px; /* Pushes content up from footer */
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'visitors:dashboard' %}">ICE EduManage</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{% url 'visitors:dashboard' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'visitors:dashboard' %}#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'visitors:dashboard' %}#contact">Contact</a>
                    </li>
                     <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-light btn-sm" href="{% url 'student:student_login' %}">Student Login</a>
                    </li> 
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2025 EduManage | All Rights Reserved</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
