<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Authentication | ICE Institute</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ice-primary: #004aad;
        --ice-dark: #001f4d;
        --ice-bg: #f8fbff;
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      body {
        background-color: #f8fbff;
        /* Elite Mesh Gradient */
        background-image:
          radial-gradient(at 0% 0%, hsla(214, 100%, 95%, 1) 0, transparent 50%),
          radial-gradient(
            at 100% 0%,
            hsla(189, 100%, 95%, 1) 0,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            hsla(214, 100%, 92%, 1) 0,
            transparent 50%
          ),
          radial-gradient(
            at 0% 100%,
            hsla(189, 100%, 92%, 1) 0,
            transparent 50%
          );
        font-family: "Inter", sans-serif;
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Subtle Technical Grid Overlay */
      body::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
          rgba(0, 74, 173, 0.04) 1px,
          transparent 0
        );
        background-size: 35px 35px;
        z-index: -1;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        box-shadow: 0 40px 100px -20px rgba(0, 31, 77, 0.15);
        width: 100%;
        max-width: 920px;
        display: flex;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.8);
        min-height: 580px;
        position: relative;
        z-index: 10;
      }

      /* Left Visual Pane */
      .login-visual {
        background: linear-gradient(
          135deg,
          var(--ice-primary) 0%,
          var(--ice-dark) 100%
        );
        width: 42%;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        color: white;
        position: relative;
      }

      /* Decorative Visual Element */
      .login-visual::before {
        content: "";
        position: absolute;
        top: 10%;
        right: 10%;
        width: 100px;
        height: 100px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
      }

      .brand-logo {
        width: 45px;
        height: 45px;
        background: white;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ice-primary);
        font-weight: 800;
        font-size: 1.3rem;
        margin-bottom: 25px;
        font-family: "Outfit";
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      /* Right Form Pane */
      .login-form-area {
        width: 58%;
        padding: 60px 70px;
        background: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .login-header h2 {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        color: var(--ice-dark);
        letter-spacing: -1.2px;
        margin-bottom: 10px;
        font-size: 2.2rem;
      }

      .text-muted-elite {
        color: #64748b;
        font-size: 1rem;
        margin-bottom: 40px;
      }

      .form-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #94a3b8;
        margin-bottom: 8px;
        display: block;
      }

      .custom-input {
        background-color: #f8fafc !important;
        border: 2px solid #f1f5f9 !important;
        padding: 14px 18px !important;
        border-radius: 16px !important;
        transition: var(--transition) !important;
        font-size: 1rem;
        color: var(--ice-dark);
      }

      .custom-input:focus {
        background-color: #ffffff !important;
        border-color: var(--ice-primary) !important;
        box-shadow: 0 15px 30px rgba(0, 74, 173, 0.08) !important;
        outline: none;
      }

      .btn-login {
        background: var(--ice-primary);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 16px;
        font-weight: 700;
        font-family: "Outfit";
        font-size: 1.1rem;
        margin-top: 25px;
        transition: var(--transition);
        box-shadow: 0 10px 25px rgba(0, 74, 173, 0.2);
      }

      .btn-login:hover {
        background: var(--ice-dark);
        color: white;
        transform: translateY(-4px) scale(1.02); /* Slight scale up */
        box-shadow:
          0 20px 30px rgba(0, 74, 173, 0.25),
          inset 0 0 10px rgba(255, 255, 255, 0.1); /* Inner glow */
        letter-spacing: 0.5px; /* Sophisticated text shift */
      }

      .alert-elite {
        background: #fff1f2;
        color: #e11d48;
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-size: 0.9rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 25px;
        animation: shake 0.4s ease-in-out;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .login-card {
          flex-direction: column;
          max-width: 420px;
          min-height: auto;
          margin: 20px;
        }
        .login-visual {
          width: 100%;
          padding: 40px;
        }
        .login-form-area {
          width: 100%;
          padding: 40px 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-visual">
        <div class="brand-logo">I</div>
        <h3
          class="fw-bold"
          style="
            font-family: &quot;Outfit&quot;;
            font-size: 1.8rem;
            line-height: 1.2;
          "
        >
          ICE <br />INSTITUTE
        </h3>
        <p class="opacity-75 small mt-2">Bandra (East) Admin Portal</p>

        <div class="mt-auto">
          <div
            style="
              width: 30px;
              height: 3px;
              background: white;
              border-radius: 10px;
              margin-bottom: 15px;
            "
          ></div>
          <small class="opacity-50 d-block">Authorized Personnel Only</small>
        </div>
      </div>

      <div class="login-form-area">
        <div class="login-header">
          <h2>Admin Login</h2>
          <p class="text-muted-elite">Secure access to EduManage Cloud</p>
        </div>

      

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="username" class="form-label">System Identifier</label>
            <input
              type="text"
              name="username"
              id="username"
              class="form-control custom-input"
              required
              placeholder="admin_username"
              autocomplete="username"
            />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Security Key</label>
            <input
              type="password"
              name="password"
              id="password"
              class="form-control custom-input"
              required
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn btn-login w-100">
            Authenticate Securely
          </button>
        </form>

        <div class="text-center mt-5">
          <a
            href="/"
            class="text-decoration-none small text-muted hover-primary"
            style="transition: 0.3s"
          >
            &larr; Return to main portal
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
