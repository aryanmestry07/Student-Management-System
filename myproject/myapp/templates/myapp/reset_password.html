{% extends 'myapp/index.html' %}
{% block content %}
<h2>Reset Password for {{ student.user.username }}</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Reset Password</button>
  <a href="{% url 'myapp:student_detail' student.id %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
