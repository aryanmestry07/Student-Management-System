{% extends "myapp/index.html" %}

{% block title %}Edit Assignment{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>Edit Assignment - {{ assignment.title }}</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'myapp:course_detail' course.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
