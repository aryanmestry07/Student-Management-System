{% extends 'myapp/index.html' %}

{% block content %}
<div class="container my-5">

    <!-- HEADER -->
    <div class="mb-4">
        <h3 class="fw-bold">➕ Add Topic</h3>
        <p class="text-muted mb-0">Course: {{ course.name }}</p>
    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <!-- ✅ IMPORTANT CHANGE -->
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- TITLE -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Topic Title</label>
                    {{ form.title }}
                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    {{ form.description }}
                </div>

                <!-- NOTES FILE (PDF) -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Upload Notes (PDF)</label>
                    {{ form.notes_file }}
                    <small class="text-muted">
                        Upload PDF study material for students.
                    </small>
                </div>

                <!-- OPTIONAL TEXT NOTES (if you kept both fields) -->
                {% if form.notes %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Notes (Optional Text)</label>
                    {{ form.notes }}
                </div>
                {% endif %}

                <!-- BUTTONS -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        💾 Save Topic
                    </button>
                    <a href="{% url 'myapp:course_detail' course.id %}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
