{% extends "myapp/index.html" %}
{% load static %}

{% block content %}
<style>
    /* DELETE VERIFICATION STYLING */
    .delete-hub-container {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .delete-card-elite {
        background: #ffffff;
        border-radius: 32px;
        border: 1px solid rgba(225, 29, 72, 0.1);
        box-shadow: 0 25px 60px rgba(225, 29, 72, 0.08);
        overflow: hidden;
        max-width: 550px;
        width: 100%;
        text-align: center;
        padding: 50px;
    }

    .danger-icon-circle {
        width: 80px;
        height: 80px;
        background: #fff1f2;
        color: #e11d48;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 30px;
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        animation-delay: 0.5s;
    }

    @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .delete-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        color: var(--ice-dark);
        margin-bottom: 10px;
    }

    .notice-preview-box {
        background: #f8fafc;
        border-radius: 16px;
        padding: 20px;
        margin: 25px 0;
        border: 1px dashed #e2e8f0;
    }

    .btn-confirm-delete {
        background: #e11d48;
        color: white;
        border: none;
        padding: 14px 30px;
        border-radius: 18px;
        font-weight: 700;
        font-family: 'Outfit';
        transition: var(--transition);
        box-shadow: 0 10px 25px rgba(225, 29, 72, 0.2);
        width: 100%;
    }

    .btn-confirm-delete:hover {
        background: #be123c;
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(225, 29, 72, 0.3);
    }

    .btn-cancel-elite {
        display: inline-block;
        margin-top: 20px;
        color: #94a3b8;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn-cancel-elite:hover {
        color: var(--ice-dark);
    }
</style>

<div class="delete-hub-container">
    <div class="delete-card-elite">
        <div class="danger-icon-circle">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <h2 class="delete-title">Confirm Removal</h2>
        <p class="text-muted">You are about to permanently delete this dispatch from the ICE CORE database.</p>

        <div class="notice-preview-box">
            <small class="text-uppercase fw-bold text-muted d-block mb-1" style="letter-spacing: 1px; font-size: 0.65rem;">Notice Title</small>
            <h5 class="text-danger fw-bold mb-0">{{ notice.title }}</h5>
        </div>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-confirm-delete">
                Confirm Destruction <i class="bi bi-trash3-fill ms-2"></i>
            </button>
            <a href="{% url 'myapp:notice_list' %}" class="btn-cancel-elite">
                Return to Safety
            </a>
        </form>
    </div>
</div>
{% endblock %}
