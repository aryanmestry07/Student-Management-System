<div class="container mt-4">
    <h2 class="fw-bold mb-3">Update Student</h2>

    <form method="post">
        {% csrf_token %}

        <!-- USER INFO -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="text-primary mb-3">User Information</h5>
                {{ user_form.as_p }}
            </div>
        </div>

        <!-- STUDENT INFO -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="text-primary mb-3">Student Information</h5>

                {% for field in student_form %}
                    {% if field.name != "fees_status" %}
                        <div class="mb-3">
                            {{ field.label_tag }}
                            {{ field }}
                        </div>
                    {% endif %}
                {% endfor %}

                <!-- ✅ FEES STATUS -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Fees Status</label>
                    {{ student_form.fees_status }}
                </div>

            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            <a href="{% url 'myapp:student_detail' student.id %}" class="btn btn-secondary">Cancel</a>
        </div>

    </form>
</div>
