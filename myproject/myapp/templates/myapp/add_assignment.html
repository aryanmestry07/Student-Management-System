{% extends 'myapp/index.html' %}

{% block content %}
<div class="container my-5">
    <h3>Add Assignment for {{ course.name }}</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Save Assignment</button>
        <a href="{% url 'myapp:course_detail' course.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
