{% extends 'myapp/index.html' %}
{% load static %}

{% block content %}
<style>
    /* FORM HUB STYLING */
    .form-hub-card {
        background: #ffffff;
        border-radius: 32px;
        border: 1px solid rgba(0, 74, 173, 0.05);
        box-shadow: 0 20px 50px rgba(0, 31, 77, 0.05);
        overflow: hidden;
        max-width: 850px;
        margin: 0 auto;
    }

    .form-header-accent {
        background: linear-gradient(to right, #e0f2fe, transparent);
        padding: 40px;
        border-bottom: 1px solid #f1f5f9;
    }

    .form-label-elite {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #94a3b8;
        margin-bottom: 8px;
        display: block;
    }

    /* ELITE INPUTS - Targeting Django Auto-widgets */
    .form-hub-card input, 
    .form-hub-card textarea {
        display: block;
        width: 100%;
        padding: 14px 18px;
        background-color: #f8fafc;
        border: 2px solid #f1f5f9;
        border-radius: 16px;
        transition: var(--transition);
        font-weight: 500;
        color: var(--ice-dark);
    }

    .form-hub-card input:focus, 
    .form-hub-card textarea:focus {
        background-color: #ffffff;
        border-color: var(--ice-primary);
        outline: 0;
        box-shadow: 0 10px 25px rgba(0, 74, 173, 0.08);
    }

    .btn-save {
        background: var(--ice-primary);
        color: white;
        border: none;
        padding: 14px 40px;
        border-radius: 18px;
        font-weight: 700;
        font-family: 'Outfit';
        transition: var(--transition);
        box-shadow: 0 10px 25px rgba(0, 74, 173, 0.2);
    }

    .btn-save:hover {
        background: var(--ice-dark);
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(0, 74, 173, 0.3);
    }

    .course-context-badge {
        background: white;
        color: var(--ice-primary);
        padding: 6px 16px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 0.75rem;
        display: inline-block;
        box-shadow: 0 4px 10px rgba(0, 74, 173, 0.05);
        margin-bottom: 12px;
    }
</style>

<div class="container-fluid py-2">
    <div class="mb-4">
        <a href="{% url 'myapp:course_detail' course.id %}" class="text-decoration-none text-muted small fw-bold">
            <i class="bi bi-arrow-left me-2"></i> BACK TO COURSE DETAILS
        </a>
    </div>

    <div class="form-hub-card">
        <div class="form-header-accent">
            <div class="course-context-badge text-uppercase">
                <i class="bi bi-journal-check me-1"></i> {{ course.name }}
            </div>
            <h2 class="h4 fw-800 mb-0" style="font-family: 'Outfit'; color: var(--ice-dark);">Create Assignment</h2>
            <p class="text-muted small mb-0">Publish a new task for students in this program.</p>
        </div>

        <div class="p-5">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label-elite">Task Title</label>
                    {{ form.title }}
                </div>

                <div class="mb-4">
                    <label class="form-label-elite">Instructions & Details</label>
                    {{ form.description }}
                </div>

                <div class="row mb-5">
                    <div class="col-md-6">
                        <label class="form-label-elite">Submission Deadline</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 16px 0 0 16px; border: 2px solid #f1f5f9;"><i class="bi bi-calendar-event"></i></span>
                            <div class="flex-grow-1">
                                {{ form.due_date }}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center pt-4 border-top">
                    <a href="{% url 'myapp:course_detail' course.id %}" class="text-muted text-decoration-none fw-bold small">Cancel Dispatch</a>
                    <button type="submit" class="btn-save">
                        Deploy Task <i class="bi bi-cloud-arrow-up-fill ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
