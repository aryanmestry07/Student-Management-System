<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}ICE CORE | Admin Portal{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
      :root {
        --sidebar-width: 280px;
        --ice-primary: #004aad;
        --ice-primary-light: #e6effc;
        --ice-secondary: #00c6ff;
        --ice-dark: #001f4d;
        --bg-light: #f8fbff;
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-light);
        color: var(--ice-dark);
        margin: 0;
      }

      /* --- ELITE SIDEBAR --- */
      .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        top: 0; left: 0;
        background: #ffffff;
        border-right: 1px solid rgba(0, 74, 173, 0.08);
        z-index: 1050;
        display: flex;
        flex-direction: column;
        box-shadow: 10px 0 30px rgba(0, 31, 77, 0.02);
      }

      .sidebar-brand {
        padding: 2rem 1.5rem;
        font-family: 'Outfit', sans-serif;
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--ice-dark);
        text-decoration: none !important;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
      }

      .brand-accent {
        color: var(--ice-primary);
        font-weight: 400;
        margin-left: 4px;
      }

      .nav-links-container {
        padding: 1rem 1rem;
        flex-grow: 1;
        overflow-y: auto;
      }

      .nav-section-label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #94a3b8;
        padding-left: 1rem;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
      }

      .nav-custom-link {
        display: flex;
        align-items: center;
        padding: 0.85rem 1rem;
        margin-bottom: 0.4rem;
        color: #64748b;
        text-decoration: none !important;
        border-radius: 12px;
        font-weight: 500;
        font-size: 0.9rem;
        transition: var(--transition);
      }

      .nav-custom-link i {
        font-size: 1.1rem;
        margin-right: 12px;
        transition: var(--transition);
      }

      .nav-custom-link:hover {
        background-color: var(--ice-primary-light);
        color: var(--ice-primary);
        transform: translateX(5px);
      }

      .nav-custom-link.active {
        background-color: var(--ice-primary);
        color: #ffffff;
        box-shadow: 0 10px 20px rgba(0, 74, 173, 0.15);
      }

      .nav-custom-link.active i {
        color: #ffffff;
      }

      /* --- TOP NAVBAR --- */
      .main-wrapper {
        margin-left: var(--sidebar-width);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .top-navbar {
        height: 72px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0, 74, 173, 0.08);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 2.5rem;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .user-profile-hub {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #f1f5f9;
        padding: 6px 6px 6px 16px;
        border-radius: 50px;
        cursor: pointer;
        transition: var(--transition);
      }

      .user-profile-hub:hover {
        background: #fff;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      }

      .user-name-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--ice-dark);
      }

      .avatar-circle {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, var(--ice-primary) 0%, var(--ice-secondary) 100%);
        color: white;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 0.8rem;
      }

      .btn-power-logout {
        width: 40px; height: 40px;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        color: #e11d48;
        background: #fff;
        border: 1px solid #fee2e2;
        margin-left: 12px;
        transition: var(--transition);
        text-decoration: none;
      }

      .btn-power-logout:hover {
        background: #e11d48;
        color: #fff;
        border-color: #e11d48;
        transform: translateY(-2px);
      }

      /* --- PAGE CONTENT --- */
      .page-content {
        padding: 2.5rem;
        flex-grow: 1;
      }

      /* Scrollbar Customization */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

      @media (max-width: 992px) {
        .sidebar { transform: translateX(-100%); }
        .main-wrapper { margin-left: 0; }
        .sidebar.mobile-open { transform: translateX(0); }
      }
    </style>
  </head>

  <body>
    <aside class="sidebar" id="sidebar">
      <a href="{% url 'myapp:dashboard' %}" class="sidebar-brand">
        ICE<span class="brand-accent">CORE</span>
      </a>

      <div class="nav-links-container">
        <div class="nav-section-label">General Overview</div>

        <a href="{% url 'myapp:dashboard' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="{% url 'myapp:courses' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'courses' %}active{% endif %}">
          <i class="bi bi-journal-bookmark-fill"></i> Courses
        </a>
        <a href="{% url 'myapp:students' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'students' %}active{% endif %}">
          <i class="bi bi-people-fill"></i> Students
        </a>

        <div class="nav-section-label">Communication</div>

        <a href="{% url 'myapp:notice_list' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'notice_list' %}active{% endif %}">
          <i class="bi bi-megaphone-fill"></i> Notice Board
        </a>
        <a href="{% url 'myapp:contact_messages' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'contact_messages' %}active{% endif %}">
          <i class="bi bi-chat-left-text-fill"></i> Messages
        </a>

        <div class="nav-section-label">Administration</div>

        <a href="{% url 'myapp:add_course' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'add_course' %}active{% endif %}">
          <i class="bi bi-plus-square-fill"></i> Add Course
        </a>
        <a href="{% url 'myapp:student_signup_admin' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'student_signup_admin' %}active{% endif %}">
          <i class="bi bi-person-plus-fill"></i> Enroll Student
        </a>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="top-navbar">
        {% if user.is_authenticated %}
          <div class="d-flex align-items-center">
            <div class="user-profile-hub">
              <span class="user-name-text">Hi, {{ user.username }}</span>
              <div class="avatar-circle">{{ user.username|slice:":1"|upper }}</div>
            </div>

            <a href="{% url 'accounts:logout' %}" class="btn-power-logout">
              <i class="bi bi-power"></i>
            </a>
          </div>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="btn btn-primary px-4 rounded-pill fw-bold" style="background: var(--ice-primary); border:none;">
            Portal Login
          </a>
        {% endif %}
      </header>
    
      <main class="page-content">
        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
