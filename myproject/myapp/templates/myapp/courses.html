<!--course.html-->
{% extends 'myapp/index.html' %}

{% block content %}
<div class="mb-4">
    <h2 class="h4 fw-bold">Course Management</h2>
    <p class="text-muted">Manage and monitor all your courses</p>
</div>

<div class="row">
    {% for course in courses %}
    <div class="col-md-4 mb-4">
        <a href="{% url 'myapp:course_detail' course.id %}" class="text-decoration-none text-dark">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ course.name }}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">{{ course.category }}</h6>
                    <p class="card-text">{{ course.description|truncatewords:10 }}</p>
                </div>
            </div>
        </a>
    </div>
    {% empty %}
    <p>No courses added yet.</p>
    {% endfor %}
</div>
{% endblock %}
