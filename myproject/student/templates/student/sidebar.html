<style>
    #sidebar {
        width: 260px;
        min-width: 260px;
        background-color: #0f172a;
        transition: all 0.3s ease;
        flex-shrink: 0;
        z-index: 1050;
    }

    #sidebar.collapsed {
        width: 80px;
        min-width: 80px;
    }

    .nav-custom-link {
        display: flex;
        align-items: center;
        padding: 0.8rem 1.25rem;
        margin: 0.2rem 0.75rem;
        color: #94a3b8;
        text-decoration: none;
        border-radius: 12px;
        white-space: nowrap;
    }

    .nav-custom-link:hover, .nav-custom-link.active {
        background-color: #4f46e5;
        color: white;
    }

    #sidebar.collapsed .nav-text,
    #sidebar.collapsed .brand-name {
        display: none;
    }
</style>

<div id="sidebar" class="d-flex flex-column min-vh-100 shadow">

    <!-- HEADER -->
    <div class="p-4 d-flex align-items-center justify-content-between">
        <h5 class="text-white fw-bold mb-0 brand-name">ICE PORTAL</h5>
        <button class="btn btn-sm btn-dark border-secondary" onclick="toggleSidebar()">☰</button>
    </div>

    <!-- NAV -->
    <nav class="mt-3 flex-grow-1 d-flex flex-column">

        <a href="{% url 'student:student_dashboard' %}" class="nav-custom-link">
            <span class="nav-text">Dashboard</span>
        </a>

        <a href="{% url 'student:my_courses' %}" class="nav-custom-link">
            <span class="nav-text">My Courses</span>
        </a>

        <a href="{% url 'student:all_assignments' %}" class="nav-custom-link">
            <span class="nav-text">Assignments</span>
        </a>

        <a href="{% url 'student:notice_board' %}" class="nav-custom-link">
            <span class="nav-text">Notice Board</span>
        </a>

        <a href="{% url 'student:id_card' %}" class="nav-custom-link">
            <span class="nav-text">ID Card</span>
        </a>

        <!-- LOGOUT AT BOTTOM -->
        <div class="mt-auto">
            <a href="{% url 'student:student_logout' %}" class="nav-custom-link text-danger">
                <span class="nav-text">Logout</span>
            </a>
        </div>

    </nav>
</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
    }
</script>
