<style>
    :root {
        --sidebar-bg: #00122e; /* Deepest ICE Navy */
        --sidebar-hover: #004aad; /* ICE Primary */
        --sidebar-text: #94a3b8;
        --sidebar-active-text: #ffffff;
    }

    #sidebar {
        width: 280px;
        min-width: 280px;
        background-color: var(--sidebar-bg);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        flex-shrink: 0;
        z-index: 1050;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        font-family: 'Inter', sans-serif;
    }

    #sidebar.collapsed {
        width: 85px;
        min-width: 85px;
    }

    /* Brand Section */
    .brand-section {
        padding: 1.5rem;
        height: 85px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .brand-logo-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        letter-spacing: 1px;
        color: white;
        margin: 0;
    }

    /* Navigation Links */
    .nav-custom-link {
        display: flex;
        align-items: center;
        padding: 0.9rem 1.25rem;
        margin: 0.3rem 1rem;
        color: var(--sidebar-text);
        text-decoration: none;
        border-radius: 12px;
        white-space: nowrap;
        transition: all 0.3s ease;
        font-weight: 500;
        font-size: 0.95rem;
    }

    .nav-icon {
        font-size: 1.25rem;
        min-width: 35px;
        display: flex;
        align-items: center;
    }

    .nav-custom-link:hover {
        background-color: rgba(255, 255, 255, 0.05);
        color: white;
    }

    .nav-custom-link.active {
        background-color: var(--sidebar-hover);
        color: white;
        box-shadow: 0 10px 20px rgba(0, 74, 173, 0.2);
    }

    .nav-custom-link.text-danger:hover {
        background-color: rgba(220, 38, 38, 0.1);
        color: #ef4444 !important;
    }

    /* Collapsed State Logic */
    #sidebar.collapsed .nav-text,
    #sidebar.collapsed .brand-logo-text {
        display: none;
    }

    #sidebar.collapsed .nav-custom-link {
        justify-content: center;
        padding: 0.9rem 0;
    }

    #sidebar.collapsed .nav-icon {
        min-width: unset;
        margin: 0;
    }

    #sidebar.collapsed .brand-section {
        justify-content: center;
    }

    /* Active Link Indicator */
    .nav-custom-link.active .nav-icon {
        color: white;
    }
</style>

<div id="sidebar" class="d-flex flex-column min-vh-100">

    <div class="brand-section">
        <h5 class="brand-logo-text">ICE PORTAL</h5>
        <button class="btn btn-link text-white p-0 shadow-none" onclick="toggleSidebar()">
            <i class="bi bi-text-indent-left fs-4" id="toggleIcon"></i>
        </button>
    </div>

    <nav class="mt-4 flex-grow-1 d-flex flex-column">

        <a href="{% url 'student:student_dashboard' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
            <div class="nav-icon"><i class="bi bi-grid-1x2-fill"></i></div>
            <span class="nav-text">Dashboard</span>
        </a>

        <a href="{% url 'student:my_courses' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'my_courses' %}active{% endif %}">
            <div class="nav-icon"><i class="bi bi-journal-bookmark-fill"></i></div>
            <span class="nav-text">My Courses</span>
        </a>

        <a href="{% url 'student:all_assignments' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'all_assignments' %}active{% endif %}">
            <div class="nav-icon"><i class="bi bi-clipboard-check-fill"></i></div>
            <span class="nav-text">Assignments</span>
        </a>

        <a href="{% url 'student:notice_board' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'notice_board' %}active{% endif %}">
            <div class="nav-icon"><i class="bi bi-megaphone-fill"></i></div>
            <span class="nav-text">Notice Board</span>
        </a>

        <a href="{% url 'student:id_card' %}" class="nav-custom-link {% if request.resolver_match.url_name == 'id_card' %}active{% endif %}">
            <div class="nav-icon"><i class="bi bi-person-badge-fill"></i></div>
            <span class="nav-text">Digital ID</span>
        </a>

        <div class="mt-auto mb-4 border-top border-white border-opacity-10 pt-3">
            <a href="{% url 'student:student_logout' %}" class="nav-custom-link text-danger">
                <div class="nav-icon"><i class="bi bi-box-arrow-left"></i></div>
                <span class="nav-text">Logout</span>
            </a>
        </div>

    </nav>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const icon = document.getElementById("toggleIcon");
        sidebar.classList.toggle("collapsed");
        
        if (sidebar.classList.contains("collapsed")) {
            icon.classList.replace("bi-text-indent-left", "bi-text-indent-right");
        } else {
            icon.classList.replace("bi-text-indent-right", "bi-text-indent-left");
        }
    }
</script>
