{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Authentication | ICE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --ice-primary: #004aad;
            --ice-dark: #001f4d;
            --ice-bg: #f8fbff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: #f8fbff;
            /* Elite Mesh Gradient */
            background-image: 
                radial-gradient(at 0% 0%, hsla(214,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(189,100%,95%,1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(214,100%,92%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(189,100%,92%,1) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle Technical Grid Overlay */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 74, 173, 0.04) 1px, transparent 0);
            background-size: 35px 35px;
            z-index: -1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 40px 100px -20px rgba(0, 31, 77, 0.15);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--ice-primary) 0%, var(--ice-dark) 100%);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px rgba(0, 74, 173, 0.2);
        }

        .login-header h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--ice-dark);
            letter-spacing: -1px;
        }

        /* Elite Form Controls */
        .form-floating > .form-control {
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            border-radius: 16px;
            transition: var(--transition);
        }

        .form-floating > .form-control:focus {
            border-color: var(--ice-primary);
            background-color: #fff;
            box-shadow: 0 10px 20px rgba(0, 74, 173, 0.05);
        }

        .form-floating > label {
            color: #94a3b8;
            font-weight: 500;
            padding-left: 1.25rem;
        }

        /* --- Premium Button Logic --- */
        .btn-primary {
            background: var(--ice-primary);
            border: none;
            padding: 14px 0;
            border-radius: 16px;
            font-weight: 700;
            font-family: 'Outfit';
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 10px 25px rgba(0, 74, 173, 0.2);
        }

        .btn-primary:hover {
            background: var(--ice-dark);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 74, 173, 0.25), 
                        inset 0 0 10px rgba(255, 255, 255, 0.1);
            letter-spacing: 0.5px;
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }

        /* --- Alert Styling --- */
        .alert-elite {
            background: #fff1f2;
            color: #e11d48;
            border-radius: 14px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            padding: 12px 16px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .back-link {
            transition: var(--transition);
            color: #94a3b8 !important;
        }

        .back-link:hover {
            color: var(--ice-primary) !important;
            transform: translateX(-3px);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="brand-icon">
                <i class="bi bi-person-badge-fill"></i>
            </div>
            <h2>Student Login</h2>
            <p class="text-muted small">Enter your credentials to access your dashboard</p>
        </div>


        <form method="post">
            {% csrf_token %}
            
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control shadow-none" id="floatingInput" placeholder="Username" required>
                <label for="floatingInput">Student ID / Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control shadow-none" id="floatingPassword" placeholder="Password" required>
                <label for="floatingPassword">Security Password</label>
            </div>

          

            <button type="submit" class="btn btn-primary w-100 mb-4">
                Sign In to Portal
            </button>

            <div class="text-center">
                <a href="/" class="back-link text-decoration-none small d-inline-flex align-items-center">
                    <i class="bi bi-arrow-left me-2"></i> Back to main website
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
