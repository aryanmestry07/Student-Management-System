{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | ICE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            padding: 2rem;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            border: none;
        }
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-header i {
            font-size: 2.5rem;
            color: #004aad;
        }
        .login-header h2 {
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* --- Custom Blue Institute Button --- */
        .btn-primary {
            background-color: #004aad;
            border-color: #004aad;
            padding: 10px 0;
            font-weight: 500;
        }
        .btn-primary:hover {
            background-color: #003a8c; /* A darker shade for hover */
            border-color: #003a8c;
        }

        /* --- Custom Form Focus Color --- */
        .form-control:focus {
            border-color: #004aad;
            box-shadow: 0 0 0 .25rem rgba(0, 74, 173, .25);
        }
        .form-floating > .form-control:focus ~ label {
            color: #004aad;
        }

        /* --- Alert/Message Styling --- */
        .alert {
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="login-header">
            <i class="bi bi-lock-fill"></i>
            <h2>ICE Student Portal</h2>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="floatingInput" placeholder="Username" required>
                <label for="floatingInput">Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                <label for="floatingPassword">Password</label>
            </div>

            <div class="d-flex justify-content-end mb-3">
                <a href="#" class="text-muted text-decoration-none" style="font-size: 0.9rem;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
