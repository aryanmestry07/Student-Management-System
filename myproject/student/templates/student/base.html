{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Portal{% endblock %} | ICE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ice-primary: #1a4fba;
            --ice-primary-dark: #0f3494;
            --ice-primary-light: #ddeaff;
            --ice-secondary: #06b6d4;
            --ice-accent: #6366f1;
            --ice-dark: #040d21;
            --ice-navy: #0a1628;
            --ice-text: #1e293b;
            --ice-muted: #64748b;
            --ice-bg: #f8faff;
            --ice-surface: #ffffff;
            --shadow-sm: 0 2px 12px rgba(10,22,40,0.06);
            --shadow-md: 0 8px 30px rgba(10,22,40,0.10);
            --shadow-lg: 0 20px 60px rgba(10,22,40,0.14);
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--ice-bg);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--ice-text);
        }

        h1, h2, h3, h4, h5, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* Cleaner, non-fancy card style to replace glass-card */
        .glass-card {
            background: var(--ice-surface);
            border: 1px solid rgba(10,22,40,0.06);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }

        .btn-ice {
            background: var(--ice-primary);
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            box-shadow: 0 4px 15px rgba(26,79,186,0.25);
        }

        .btn-ice:hover {
            background: var(--ice-primary-dark);
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 8px 25px rgba(26,79,186,0.35);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: var(--ice-primary-light); 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--ice-primary);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
