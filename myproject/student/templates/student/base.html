{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Portal{% endblock %} | ICE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ice-primary: #004aad;
            --ice-dark: #001f4d;
            --ice-light: #f8fbff;
            --ice-accent: #00d2ff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        body {
            background-color: var(--ice-light);
            background-image: 
                radial-gradient(at 0% 0%, hsla(214,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(189,100%,95%,1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(214,100%,92%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(189,100%,92%,1) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--ice-dark);
        }

        h1, h2, h3, h4, h5, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism utility */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 31, 77, 0.05);
        }

        .btn-ice {
            background: var(--ice-primary);
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: var(--transition);
            border: none;
        }

        .btn-ice:hover {
            background: var(--ice-dark);
            transform: translateY(-2px);
            color: white;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(0, 74, 173, 0.1); 
            border-radius: 10px; 
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
